<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deepline Support</title>
  <meta name="description" content="Deepline Support">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f14;
      color: #f5f7fa;
    }
    a {
      color: inherit;
      padding: .9rem 1.25rem;
      border: 1px solid #394553;
      border-radius: 999px;
      text-decoration: none;
      background: #151c24;
    }
    a:hover { background: #202b37; }
  </style>
</head>
<body>
  <a href="./aspen/">Open Aspen videos</a>
</body>
</html>
